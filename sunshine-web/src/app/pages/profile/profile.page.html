<div class="shell">
  <app-sidebar />

  <main class="workspace">
    <header class="page-header">
      <div>
        <span class="page-label">Conta</span>
        <h1>Meu Perfil</h1>
      </div>
    </header>

    @if (loading()) {
      <div class="state-loading">Carregando perfil...</div>
    } @else {
      <div class="profile-card">
        <div class="card-section">
          <h2>Dados pessoais</h2>
          <p>Atualize suas informações de conta.</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="save()" novalidate>
          <div class="form-grid">
            <label>
              <span class="field-label">Nome <b class="required">*</b></span>
              <input type="text" formControlName="name" autocomplete="name" />
              @if (form.controls.name.touched && form.controls.name.invalid) {
                <small class="field-error">Informe um nome com pelo menos 2 caracteres.</small>
              }
            </label>

            <label>
              <span class="field-label">E-mail</span>
              <input type="email" formControlName="email" autocomplete="email" />
              <small class="field-hint">O e-mail não pode ser alterado.</small>
            </label>

            <label class="wide">
              <span class="field-label">Nova senha</span>
              <input type="password" formControlName="password" autocomplete="new-password" placeholder="Deixe em branco para não alterar" />
            </label>
          </div>

          @if (errorMessage()) {
            <div class="alert alert-error">
              <app-icon name="alert-circle" [size]="16" />
              {{ errorMessage() }}
            </div>
          }

          @if (successMessage()) {
            <div class="alert alert-success">
              <app-icon name="check-circle" [size]="16" />
              {{ successMessage() }}
            </div>
          }

          <div class="form-actions">
            <button type="submit" class="btn-primary" [disabled]="saving()">
              {{ saving() ? 'Salvando...' : 'Salvar perfil' }}
            </button>
          </div>
        </form>
      </div>
    }
  </main>
</div>
