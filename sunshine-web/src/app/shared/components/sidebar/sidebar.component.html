<aside class="sidebar">
  <div class="sidebar-brand">
    <img src="sunshine-logo.png" alt="SunShine Pratas" />
  </div>

  <nav aria-label="Navegação principal">
    @for (entity of entities; track entity.id) {
      <a [routerLink]="['/painel', entity.path]" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }">
        <app-icon [name]="entity.icon" [size]="18" />
        {{ entity.title }}
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <a routerLink="/painel/perfil" routerLinkActive="active" class="profile-link">
      <app-icon name="user" [size]="18" />
      <span class="profile-name">{{ userName() }}</span>
    </a>
    <button type="button" class="logout-btn" title="Sair" (click)="logout()">
      <app-icon name="log-out" [size]="18" />
    </button>
  </div>
</aside>
